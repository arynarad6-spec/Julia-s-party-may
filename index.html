<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Party Invitation</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f8f0f2;
            color: #333;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        h1 {
            color: #e91e63;
        }
        .invitation-container {
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            padding: 40px;
            margin: auto;
            width: 60%;
        }
        .date {
            font-size: 1.5em;
            margin: 20px 0;
        }
        .rsvp {
            margin-top: 30px;
            font-size: 1.2em;
        }
        button {
            background-color: #e91e63;
            border: none;
            color: white;
            padding: 10px 20px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 4px 2px;
            cursor: pointer;
            border-radius: 5px;
        }
        footer {
            margin-top: 50px;
            font-size: 0.8em;
            color: #777;
        }
    </style>
</head>
<body>
    <div class="invitation-container">
        <h1>You Are Invited!</h1>
        <p>Join us for a beautiful wedding party celebration!</p>
        <div class="date">April 24, 2026</div>
        <p>Location: The Grand Ballroom, City Center</p>
        <p>Time: 5:00 PM - 11:00 PM</p>
        <p>Dress Code: Formal Attire</p>
        <div class="rsvp">
            <p>Please RSVP by April 10, 2026</p>
            <button onclick="alert('Thank you for your RSVP!')">RSVP Now!</button>
        </div>
    </div>
    <footer>
        <p>&copy; 2026 Wedding Celebration. All rights reserved.</p>
    </footer>
    <script>
        console.log('Welcome to the Wedding Invitation!');
    </script>
</body>
</html>
